services:
  - type: web
    name: agribuild-quote-builder
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    disk:
      name: agribuild-submissions
      mountPath: /var/data/submissions
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: SUBMISSIONS_DIR
        value: /var/data/submissions
      - key: FORWARD_TO
        sync: false
      - key: APP_MAILBOX
        sync: false
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
